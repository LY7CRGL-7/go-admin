# ========================================
# 企业级 Go 微服务管理端模板 - 配置文件
# 基于 Kratos 框架，支持 MySQL / PostgreSQL 切换
# ========================================

server:
  http:
    addr: 0.0.0.0:8080
    timeout: 10s
  grpc:
    addr: 0.0.0.0:9090
    timeout: 10s

data:
  database:
    # 数据库驱动（mysql 或 postgres）
    driver: postgres
    # PostgreSQL DSN
    source: "host=localhost port=5432 user=admin password=admin123 dbname=admin_db sslmode=disable timezone=Asia/Shanghai"
    # MySQL DSN（取消注释并注释上面的 source 即可切换）
    # driver: mysql
    # source: "admin:admin123@tcp(localhost:3306)/admin_db?charset=utf8mb4&parseTime=True&loc=Local"
    max_idle: 10
    max_open: 100
    max_lifetime: 3600s
  redis:
    addr: localhost:6379
    password: ""
    db: 0
    dial_timeout: 5s
    read_timeout: 3s
    write_timeout: 3s

auth:
  jwt_secret: your-256-bit-secret-key-change-in-production
  token_expire: 24h
  refresh_expire: 168h   # 7 天
  init_admin:
    username: admin
    password: Admin@123456
    nickname: 系统管理员

tenant:
  enabled: false
  default_tenant_code: default
