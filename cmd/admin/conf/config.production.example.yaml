# ========================================
# 生产环境配置示例
# 复制为 config.yaml 并修改敏感信息
# ========================================

server:
  http:
    addr: 0.0.0.0:8080
    timeout: 10s
  grpc:
    addr: 0.0.0.0:9090
    timeout: 10s

data:
  database:
    driver: postgres
    source: "host=db.internal port=5432 user=admin password=CHANGE_ME dbname=admin_db sslmode=require timezone=Asia/Shanghai"
    # MySQL:
    # driver: mysql
    # source: "admin:CHANGE_ME@tcp(db.internal:3306)/admin_db?charset=utf8mb4&parseTime=True&loc=Local"
    max_idle: 10
    max_open: 50
    max_lifetime: 1800s

  redis:
    addr: redis.internal:6379
    password: CHANGE_ME
    db: 0
    dial_timeout: 5s
    read_timeout: 3s
    write_timeout: 3s

auth:
  # ⚠️ 必须替换为强随机密钥：openssl rand -base64 64
  jwt_secret: CHANGE-THIS-TO-A-RANDOM-256-BIT-SECRET
  token_expire: 2h
  refresh_expire: 72h
  init_admin:
    username: admin
    password: CHANGE-THIS-TO-STRONG-PASSWORD
    nickname: 系统管理员

tenant:
  enabled: false
  default_tenant_code: default
