# ========================================
# Kratos Admin Template - CI
# 模板质量检查（编译 + 格式 + Docker 构建验证）
# ========================================

name: Template Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GO_VERSION: '1.25'

jobs:
  quality-check:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        check-latest: true

    - name: Download dependencies
      run: go mod download

    - name: Build
      run: go build -v ./cmd/admin

    - name: Test
      run: go test ./... 2>&1 || echo "⚠️ tests skipped or failed (normal for template)"
      continue-on-error: true

    - name: Format check
      run: |
        diff=$(gofmt -l .)
        if [ -n "$diff" ]; then echo "⚠️ needs formatting:"; echo "$diff"; fi
      continue-on-error: true

  docker-check:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - name: Build image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: admin:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max
