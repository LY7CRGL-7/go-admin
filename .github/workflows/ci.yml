name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.25'

jobs:
  # 代码检查和测试
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: admin_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        check-latest: true
    
    - name: Enable Go toolchain auto-upgrade
      run: |
        echo "GOTOOLCHAIN=auto" >> $GITHUB_ENV
        echo "GOFLAGS=-mod=mod" >> $GITHUB_ENV
    
    - name: Download dependencies
      run: make deps
    
    - name: Run linter
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        args: --timeout=5m
      continue-on-error: true
    
    - name: Run tests
      run: make test
      continue-on-error: true
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: admin
        DB_PASSWORD: admin123
        DB_NAME: admin_db
        REDIS_ADDR: localhost:6379
    
    - name: Verify build
      run: go build ./cmd/admin

  # 构建
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        check-latest: true
    
    - name: Enable Go toolchain auto-upgrade
      run: |
        echo "GOTOOLCHAIN=auto" >> $GITHUB_ENV
        echo "GOFLAGS=-mod=mod" >> $GITHUB_ENV
    
    - name: Download dependencies
      run: make deps
    
    - name: Build binary
      run: |
        GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
        go build -ldflags "-X main.Version=${{ github.sha }}" \
        -o bin/admin-${{ matrix.goos }}-${{ matrix.goarch }} cmd/admin/main.go
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: admin-${{ matrix.goos }}-${{ matrix.goarch }}
        path: bin/admin-${{ matrix.goos }}-${{ matrix.goarch }}
        retention-days: 30

  # Docker 构建
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      if: github.repository_owner == 'LY7CRGL-7'
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.repository_owner == 'LY7CRGL-7' }}
        tags: |
          admin:latest
          admin:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
