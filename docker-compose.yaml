# ========================================
# Kratos Admin Template - Docker Compose
# 核心依赖：PostgreSQL + Redis
# 可选：切换为 MySQL（见注释）
# ========================================

services:
  # ---------- PostgreSQL ----------
  # 切换 MySQL：注释此块，取消下方 mysql 块注释
  postgres:
    image: postgres:16-alpine
    container_name: admin-postgres
    environment:
      POSTGRES_DB: admin_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123  # ⚠️ 生产环境请修改
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docs/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d admin_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- MySQL（可选，取消注释即可使用） ----------
  # mysql:
  #   image: mysql:8.0
  #   container_name: admin-mysql
  #   environment:
  #     MYSQL_DATABASE: admin_db
  #     MYSQL_USER: admin
  #     MYSQL_PASSWORD: admin123
  #     MYSQL_ROOT_PASSWORD: root123
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   command: --default-authentication-plugin=mysql_native_password
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: admin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Admin Service（可选） ----------
  # 取消注释后可直接 docker-compose up 启动完整服务
  # admin:
  #   build:
  #     context: .
  #     args:
  #       VERSION: dev
  #   container_name: admin-service
  #   ports:
  #     - "8080:8080"  # HTTP
  #     - "9090:9090"  # gRPC
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./cmd/admin/conf/config.yaml:/app/config.yaml

volumes:
  pg_data:
  redis_data:
  # mysql_data:
