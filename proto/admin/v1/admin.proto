syntax = "proto3";

package admin.v1;

option go_package = "admin/proto/admin/v1;adminv1";

// 认证服务
message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  AdminInfo admin = 2;
}

message AdminInfo {
  int64 id = 1;
  string username = 2;
  string nickname = 3;
  string email = 4;
  string phone = 5;
  int32 status = 6;
}

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {
  bool success = 1;
  string message = 2;
}

// 管理员管理
message CreateAdminRequest {
  string username = 1;
  string password = 2;
  string nickname = 3;
  string email = 4;
  string phone = 5;
  repeated int64 role_ids = 6;
}

message UpdateAdminRequest {
  int64 id = 1;
  string nickname = 2;
  string email = 3;
  string phone = 4;
  int32 status = 5;
  repeated int64 role_ids = 6;
}

message AdminListRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
}

message AdminListResponse {
  repeated AdminInfo admins = 1;
  int64 total = 2;
}

// 角色管理
message CreateRoleRequest {
  string name = 1;
  string code = 2;
  string description = 3;
}

message UpdateRoleRequest {
  int64 id = 1;
  string name = 2;
  string description = 3;
}

message RoleInfo {
  int64 id = 1;
  string name = 2;
  string code = 3;
  string description = 4;
  repeated int64 permission_ids = 5;
}

message RoleListResponse {
  repeated RoleInfo roles = 1;
  int64 total = 2;
}

// 权限管理
message PermissionInfo {
  int64 id = 1;
  string name = 2;
  string code = 3;
  string resource = 4;
  string action = 5;
  int64 parent_id = 6;
}

message PermissionListResponse {
  repeated PermissionInfo permissions = 1;
}

// 审计日志
message AuditLogInfo {
  int64 id = 1;
  int64 admin_id = 2;
  string admin_username = 3;
  string action = 4;
  string resource = 5;
  string request_method = 6;
  string request_path = 7;
  string request_body = 8;
  string response_body = 9;
  string ip = 10;
  string user_agent = 11;
  int64 duration = 12;
  int32 status_code = 13;
  string created_at = 14;
}

message AuditLogListRequest {
  int32 page = 1;
  int32 page_size = 2;
  int64 admin_id = 3;
  string action = 4;
}

message AuditLogListResponse {
  repeated AuditLogInfo logs = 1;
  int64 total = 2;
}

// 通用响应
message Response {
  int32 code = 1;
  string msg = 2;
  bytes data = 3;
}
